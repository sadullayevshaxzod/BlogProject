{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    <header>
        <h1><a href="{% url 'home' %}">Bosh sahifa</a></h1>
        
    </header>
       {% if user.is_authenticated %}
       <p>Xush kelibsiz {{user.username}}</p>
       <form action="{% url 'logout' %}" method="post">{% csrf_token %}
        <button type="submit">Saytdan chiqish</button>
       </form>
       {% else %}
       <a href="{% url 'login' %}">Saytga kirish</a>
       {% endif %}
    {% block content %}
    {% endblock content %}
    <footer>
       <form action="{% url 'post_new' %}" method="get">
    <button type="submit">Yangi post yozish</button>
</form>
    </footer>
</body>
</html>
